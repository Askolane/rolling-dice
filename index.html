<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Dice Drift</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Dice Drift">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dice Drift</p>
          <h1>굴림의 틈</h1>
        </div>
        <div class="mode-tabs" role="tablist" aria-label="mode">
          <button class="tab active" data-mode="play" type="button">플레이</button>
          <button class="tab" data-mode="editor" type="button">제작</button>
        </div>
      </header>

      <section class="game-shell">
        <div class="status-row">
          <div>
            <span class="label">레벨</span>
            <select id="levelSelect" aria-label="level select"></select>
          </div>
          <div class="stats">
            <span id="moveCount">0턴</span>
            <span id="topFace">윗면 1</span>
          </div>
        </div>

        <div id="boardWrap" class="board-wrap" aria-live="polite">
          <div id="dicePreview" class="dice-preview" aria-label="current dice orientation"></div>
          <div id="board" class="board"></div>
          <div id="toast" class="toast" hidden></div>
        </div>

        <div class="action-row">
          <button id="prevLevel" class="icon-button" type="button" aria-label="previous level">
            <span aria-hidden="true">‹</span>
          </button>
          <button id="undoMove" class="icon-button" type="button" aria-label="undo move">
            <span aria-hidden="true">↶</span>
          </button>
          <button id="resetLevel" class="primary-button" type="button">다시 시작</button>
          <button id="nextLevel" class="icon-button" type="button" aria-label="next level">
            <span aria-hidden="true">›</span>
          </button>
        </div>
      </section>

      <section id="editorPanel" class="editor-panel" hidden>
        <div class="panel-section tools">
          <button class="tool active" data-tool="path" type="button">길</button>
          <button class="tool" data-tool="start" type="button">시작</button>
          <button class="tool" data-tool="goal" type="button">목표</button>
          <button class="tool" data-tool="sticky" type="button">끈끈</button>
          <button class="tool" data-tool="water" type="button">물</button>
          <button class="tool" data-tool="void" type="button">공허</button>
          <button class="tool" data-tool="wall" type="button">벽</button>
        </div>

        <div class="panel-section editor-grid">
          <label>
            가로
            <input id="gridWidth" type="number" min="4" max="12" value="7" />
          </label>
          <label>
            세로
            <input id="gridHeight" type="number" min="4" max="12" value="7" />
          </label>
          <label>
            방향
            <select id="editDir">
              <option value="up">위</option>
              <option value="right">오른쪽</option>
              <option value="down">아래</option>
              <option value="left">왼쪽</option>
            </select>
          </label>
          <label>
            시작 윗면
            <select id="startTop">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </label>
          <label>
            보드 위쪽 면
            <select id="startNorth"></select>
          </label>
        </div>

        <div class="panel-section editor-actions">
          <button id="newLevel" type="button">새 판</button>
          <button id="cloneLevel" type="button">복제</button>
          <button id="saveLevel" class="primary-button" type="button">저장</button>
          <button id="testLevel" type="button">검증</button>
        </div>

        <div class="panel-section generator">
          <label>
            생성 난이도
            <input id="genDifficulty" type="range" min="1" max="5" value="3" />
          </label>
          <button id="generateLevel" class="primary-button" type="button">생성</button>
        </div>

        <textarea id="levelJson" spellcheck="false" aria-label="level json"></textarea>
        <div class="panel-section editor-actions">
          <button id="exportLevel" type="button">내보내기</button>
          <button id="importLevel" type="button">불러오기</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
